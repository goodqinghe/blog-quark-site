<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>我的 Reveal 测试</title>
    <!-- 直接用 CDN 引入 Reveal.js，不用下载任何包 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reset.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/theme/dracula.min.css"
    />
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- 只有简单的一页 -->
        <section>
          <h1>测试成功</h1>
          <p>这是一个完全独立的幻灯片页面。</p>
        </section>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.js"></script>
    <script>
      Reveal.initialize();
    </script>
  </body>
</html>
